<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
        }
        center{
            margin-top: 40px;

        }
        label{
            font-size: 30px;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
        input{
            width: 200px;
            height: 20px;
            border-radius: 10px;
            text-align: center;
            justify-content: center;
            font-size: 18px;

        }
        #result{
            color: white;
            font-size: 20px;
        }
        button{
            padding: 8px 15px;
            border-radius: 10px;
            background-color: rgb(255, 255, 255);
            color: rgb(0, 0, 0);
            font-size: 18px;
            font-weight: bold;
        }
       
    </style>
</head>
<body>
    <center>
        <label for="">ENTER YOUR LUCKY NUMBER</label>
        <br>
        <br>
        <input type="text" name="" id="num">
        <br>
        <br>
        <button onclick="khan()"> CLICK</button>
        <p id="result"></p>
    </center>
    <script>
        function khan() {
            let num = Number( document.getElementById("num").value);
            let rand =Math.floor(Math.random()*10)+1;
            if (num === rand) {
                document.getElementById("result").innerHTML='YOU ARE WIN 100 MILLON'
            } else {
                document.getElementById("result").innerHTML='TRY AGAIN '+rand;
                
            }

        }
    </script>
</body>
</html>
