<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;margin: 0;
            box-sizing: border-box;
        }
         body{
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: rgb(0, 0, 0);

       }
    .container{
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
    }
    .card{
        background-color: rgb(156, 149, 149);
        border-radius: 18px;
        width: 100%;
        max-width: 300px;
        padding: 20px;
        text-align: center;
        max-height: 400px;
    }
       .card img{
        width: 100%;
        border-radius: 8px;
       } 
       .card h3{
        margin: 10px 0;
        font-size: 1.2rem;
       }
       .card p{
        display: inline-block;
        margin-top: 10px;
        padding: 10px 15px;
        background-color: red;
        color: white;
        text-decoration: none;
        border-radius: 4px;

       }
       .card  button{
        background-color: rgb(0, 0, 0);
        color: rgb(255, 255, 255);
        margin-top: 5px;
       }
       .card button:hover{
        background-color: rgb(255, 255, 255) ;
        color: rgb(0, 0, 0);
       }



       .hero1{
            width: 100%;
            height: 110vh;
            border: 5px solid white;
            background-size: cover;
            background-position: center;
            animation: khan 5s   infinite alternate;
            /* animation: khan 5s   linear forwards; */
            /* margin-left: 1000px; */
            /* margin-top: -100px; */
            /* border-radius: 50%; */
            padding-top: 10px;

        }
        @keyframes khan {
            0%{
                transform: translateX(0px);
                background-image: url(image/img/m7.jpg);
                transition: 4s;
                animation-delay: 5s;

            }
               25%{
                transform: translateX(0px);
                background-image: url(image/img/m1.jpg);
                transition: 3s;
                animation-delay: 5s;
                
            }
              50%{
                transform: translateX(0px);
                background-image: url(image/img/m10.jpg);
                transition: 4s;
                animation-delay: 5s;
                
            }
              75%{
                transform: translateX(0px);
                background-image: url(image/img/m9.jpg);
                transition: 4s;
                animation-delay: 5s;
                
            }
             100%{
                transform: translateX(0px);
                background-image: url(image/img/m5.jpg);
                transition: 5s;
                animation-delay: 5s;
                
            }
        }
    </style>
</head>
<body>
    <div class="hero1">
     <center>    <H1 style=" color:rgb(255, 255, 255) ; margin-bottom: 10px; font-family:  Helvetica, sans-serif;">PRODUCT SECTION</H1></center>
    <div class="container">
        <div class="card">
            <img src="image/img/m8.jpg" alt=""  width="200px" height="200px">
            <h2>this is soup</h2>

        </div>

        <div class="card">

        </div>
        <div class="card">

        <div class="card">

        <div class="card">

        </div>
        <div class="card">

        <div class="card">

</div>
