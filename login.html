<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project2</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: grey;

        }
        .container{
            max-width: 900px;
            margin:0 auto;
        }
        .apply_box{
            max-width: 600px;
            padding: 20px;
            background-color: white;
            margin: 0 auto;
            margin-top: 50px;
            box-shadow: 8px 8px 5px rgb(1, 1, 0.1);
            border-radius: 10px;
        
        }
        h1{
            margin: auto;
            text-align: center;
            font-size: 45px;
            /* font-weight: 800; */
            padding-bottom: 20px;
        }
        .a{
            font-size: 20px;
        }
        .form_com{
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
            gap: 20px;
            margin: 10px;
        }
        .form_control{
            display: flex;
            flex-direction: column;
        }
        label{
            font-size: 15px;
            margin-bottom: 5px;
        }
        input,select,textarea{
            padding: 6px 10px;
            border: 1px solid gray;
            border-radius: 4px ;
            font-size: 15px;
        }
        input:focus{
            color: red;
        }
        .button_container{
            display: flex;
            justify-content: center;
            padding-top: 20px;
        }
        button{
            background: rgb(0, 0, 0);
            border: transparent solid 2px;
            padding:8px 13px;
            color: white;
            border-radius: 7px;
            transition: 0.3s  ease-in;

        }
        button:hover{
            background: gray;
            border: 2px solid rgb(0, 0, 0);
            color: black;
            transition: 0.3s  ease-out;
            cursor: pointer;


        }

      #add{
        grid-column: 1 / span 2;
        /* width: 200%; */
      }
      #add,textarea{
        width: 100%;
      }


      @media (max-width: 460px){
        
      #add{
        grid-column: 1 / span 1;
      }
      }
    </style>
</head>
<body>
    <div class="container">
        <div class="apply_box">
           <h1>LOG IN </h1> 

            <form>
                <div class="form_com">

                    <div class="form_control">
                        <label for="FIRST_NAME">FIRST NAME </label>
                        <input type="text" id="FIRST_NAME" placeholder=" ENTER FIRST NAME">
                    </div>
                    <div class="form_control">
                        <label for="LAST_NAME">LAST NAME </label>
                        <input type="text" id="LAST_NAME" placeholder=" ENTER LAST NAME">
                    </div>
                    
                    <div class="form_control">
                        <label for="EMAIL">EMAIL </label>
                        <input type="email" id="FIRST_NAME" placeholder=" ENTER EMAIL">
                    </div>

                    

                    <div class="form_control">
                        <label for="PNCODE">PASSWORD </label>
                        <input type="password" id="PINCODE" placeholder=" ENTER YOUR PASSWORD">
                    </div>  


                </div>

                <div class="button_container">
                    <button type="submit" onclick="khan()">APPLY NOW</button>
                </div>
            </form>

        </div>
    </div>
    <script>

    </script>
</body>
</html>
