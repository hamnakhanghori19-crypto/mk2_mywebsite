<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project2</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: grey;

        }
        .container{
            max-width: 900px;
            margin:0 auto;
        }
        .apply_box{
            max-width: 600px;
            padding: 20px;
            background-color: white;
            margin: 0 auto;
            margin-top: 50px;
            box-shadow: 8px 8px 5px rgb(1, 1, 0.1);
            border-radius: 10px;
        
        }
        h1{
            margin: auto;
            text-align: center;
        }
        .a{
            font-size: 20px;
        }
        .form_com{
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
            gap: 20px;
            margin: 10px;
        }
        .form_control{
            display: flex;
            flex-direction: column;
        }
        label{
            font-size: 15px;
            margin-bottom: 5px;
        }
        input,select,textarea{
            padding: 6px 10px;
            border: 1px solid gray;
            border-radius: 4px ;
            font-size: 15px;
        }
        input:focus{
            color: red;
        }
        .button_container{
            display: flex;
            justify-content: end;
            padding-top: 20px;
        }
        button{
            background: red;
            border: transparent solid 2px;
            padding:5px 10px;
            color: white;
            border-radius: 7px;
            transition: 0.3s  ease-in;

        }
        button:hover{
            background: gray;
            border: 2px solid red;
            color: black;
            transition: 0.3s  ease-out;
            cursor: pointer;

        }

      #add{
        grid-column: 1 / span 2;
        /* width: 200%; */
      }
      #add,textarea{
        width: 100%;
      }


      @media (max-width: 460px){
        
      #add{
        grid-column: 1 / span 1;
      }
      }
    </style>
</head>
<body>
    <div class="container">
        <div class="apply_box">
           <h1>RESGISTRATION <small class="a"> (WED)</small></h1> 

            <form>
                <div class="form_com">

                    <div class="form_control">
                        <label for="FIRST_NAME">FIRST NAME </label>
                        <input type="text" id="FIRST_NAME" placeholder=" ENTER FIRST NAME">
                    </div>
                    <div class="form_control">
                        <label for="LAST_NAME">LAST NAME </label>
                        <input type="text" id="LAST_NAME" placeholder=" ENTER LAST NAME">
                    </div>
                    
                    <div class="form_control">
                        <label for="EMAIL">EMAIL </label>
                        <input type="email" id="FIRST_NAME" placeholder=" ENTER EMAIL">
                    </div>

                    <div class="form_control">
                        <label for="JOB_ROLL">JOB ROLL </label>
                       <select>
                        <option value="" id="JOB_ROLL">JOB ROLL</option>
                        <option value="frontend">frontend development</option>
                        <option value="backend">backend development</option>
                        <option value="graphic design">graphic design</option>
                        <option value="information technology">information technology</option>
                       </select>
                    </div>


                    <div class="form_control" id="add">
                        <label for="ADDRESS">ADDRESS </label>
                     <textarea  type="address" id="ADDRESS" cols="50" rows="4" placeholder=" ENTER ADDRESS" name="address"></textarea>
                     
                    </div>


                        
                    <div class="form_control">
                        <label for="CITY">CITY </label>
                        <input type="text" id="CITY" placeholder=" ENTER CITY">
                    </div>

                    <div class="form_control">
                        <label for="PNCODE">PINCODE </label>
                        <input type="number" id="PINCODE" placeholder=" ENTER YOUR PINCODE">
                    </div>  


                    <div class="form_control">
                        <label for="DATE">DATE </label>
                        <input value="2026-feb-04" type="date" id="DATE" >
                    </div>  


                    <div class="form_control">
                        <label for="upload">UPLOAD YOUR CV</label>
                        <input type="file" id="upload" placeholder=" ENTER YOUR PINCODE">
                    </div>  



                </div>

                <div class="button_container">
                    <button type="submit">APPLY NOW</button>
                </div>
            </form>

        </div>
    </div>
</body>
</html>
