        }a:hover{

        .nav{
            box-shadow: 1px 10px 9px black;

            top: 0;

            background-color:rgba(17, 15, 15, 0.911);
            padding:0 10px;
            z-index: 50;
            justify-content: space-between;
            height:  90px;
            color: white;
            /* display: inline-block; */
        }
        .navgation{
            display: flex;
            justify-content: space-between;

        }
        .ser input{
            width: 200px;

        }
        .btn{
         margin-top: 60px;

        button{
            padding:  15px 30px;
            border-radius: 10px;
            background-color: rgb(0, 0, 0);
            color: white;
            font-size: 20px;


        }
        a{
            text-decoration: none;
            color: white;

        }
        button:hover{
            color: red;
        }
      
        .aimg{
            width: 250px;
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid black;
        }
        .box{
            margin-top: -250px;
            margin-left: 100px;
            background-color: white;
            width: 350px;
            padding: 10px; 
            border-radius: 10px;
            box-shadow: 4px 4px 4px black;

        }
        .in{
            background-color: rgb(0, 0, 0);
            color: white;
        }
        footer{
            background-color: black;
            color: white;
            text-align: center;
         margin-top: 15px;
        }

    <center>
   <div class="box">
    <h1>Profile Picture</h1>
    <br>
     <img src="" id="previewImg" class="aimg">
    <br>
    <input type="file" id="fileInput" accept="image/*" class="in">
   </div>
</center>

<script>
  const img = document.querySelector('#previewImg');
  const fileInput = document.querySelector('#fileInput');

  fileInput.addEventListener('change', () => {
    if(fileInput.files && fileInput.files[0]){
      img.src = URL.createObjectURL(fileInput.files[0]);
    }
  })
</script>
