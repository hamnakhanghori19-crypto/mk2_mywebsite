<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blur Form</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: url('https://images.unsplash.com/photo-1503264116251-35a269479413') no-repeat center/cover;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .form-container {
        background: rgba(255, 255, 255, 0.15);
        padding: 30px 40px;
        border-radius: 15px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        width: 320px;
        color: #fff;
    }

    .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .input-group {
        margin-bottom: 15px;
    }

    .input-group label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
    }

    .input-group input {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        outline: none;
        background: rgba(255,255,255,0.2);
        color: white;
    }

    .input-group input::placeholder {
        color: #eee;
    }

    .input-group input:focus {
        background: rgba(255,255,255,0.3);
    }

    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: rgba(255,255,255,0.3);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: rgba(0, 0, 0, 0.5);
        color: white;
    }
</style>
</head>
<body>

<div class="form-container">
    <h2>Register</h2>
    <form>
        <div class="input-group">
            <label>Name</label>
            <input type="text" id='name' placeholder="Enter your name">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <button type="button" class="btn" onclick="khan()">Submit</button>
    </form>
</div>
<script>
    function khan() {
        let name= document.getElementById('name').value;
        let pass= document.getElementById('password').value;
        if (name =='mehmood' && pass =='12345') {
            window.location.href = 'home.html';
        }
        else{
            alert('you are not admit');
        }
    }
</script>
</body>
</html>
